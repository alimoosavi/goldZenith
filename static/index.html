<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TSETMC Orderbook Replay</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1c2128;
      --fg: #e6e1cf;
      --dim: #5c6773;
      --border: #3e4451;
      --buy: #73d13d;
      --buy-bg: rgba(115, 209, 61, 0.18);
      --sell: #ff4d4f;
      --sell-bg: rgba(255, 77, 79, 0.18);
      --gold: #ffb454;
      --accent: #39bae6;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'SF Mono', Menlo, Consolas, 'Courier New', monospace;
      margin: 0;
      padding: 1.2em 1.5em 2em;
      font-size: 14px;
    }
    h1 {
      color: var(--gold);
      margin: 0 0 1em;
      font-size: 1.4em;
      letter-spacing: 0.5px;
    }
    .controls {
      display: flex;
      gap: 0.8em;
      align-items: flex-end;
      flex-wrap: wrap;
      padding: 1em;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 1em;
    }
    .field { display: flex; flex-direction: column; gap: 0.3em; }
    .field label { color: var(--dim); font-size: 0.8em; text-transform: uppercase; letter-spacing: 0.5px; }
    input[type="text"], input[type="number"] {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--fg);
      padding: 0.5em 0.7em;
      font-family: inherit;
      font-size: 0.95em;
      border-radius: 4px;
    }
    input[type="number"] { width: 90px; }
    input[type="text"] { width: 460px; }
    input:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
    button {
      background: var(--gold);
      color: var(--bg);
      border: none;
      padding: 0.65em 1.3em;
      font-family: inherit;
      font-weight: bold;
      font-size: 0.95em;
      cursor: pointer;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }
    button:hover { filter: brightness(1.1); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .status { color: var(--dim); font-size: 0.9em; margin-left: auto; }
    .status.error { color: var(--sell); }
    .status.ok { color: var(--buy); }

    /* ── time slider panel ─────────────────────────────────────────── */
    .slider-row {
      display: grid;
      grid-template-columns: auto auto 1fr;
      gap: 1.2em;
      align-items: center;
      padding: 1em 1.2em;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 1em;
    }
    .slider-row.hidden { display: none; }
    .play-btn {
      background: var(--accent);
      color: var(--bg);
      padding: 0.55em 1em;
      font-size: 0.9em;
      min-width: 90px;
    }
    .time-col {
      display: flex;
      flex-direction: column;
      gap: 0.15em;
      min-width: 150px;
    }
    .time-col .time {
      font-size: 1.8em;
      color: var(--gold);
      font-weight: bold;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .time-col .snap-info {
      color: var(--dim);
      font-size: 0.8em;
      font-variant-numeric: tabular-nums;
    }
    .sliders-col {
      display: flex;
      flex-direction: column;
      gap: 0.55em;
    }
    .slider-pair {
      display: grid;
      grid-template-columns: 70px 1fr 70px;
      gap: 0.8em;
      align-items: center;
    }
    .slider-pair input[type="range"] {
      width: 100%;
      accent-color: var(--gold);
      height: 6px;
    }
    .slider-pair.second input[type="range"] { accent-color: var(--accent); }
    .slider-label {
      color: var(--dim);
      font-size: 0.75em;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .slider-val {
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      text-align: right;
      font-size: 0.95em;
    }
    .slider-pair.minute .slider-val { color: var(--gold); }

    /* ── orderbook grid ────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
      gap: 1em;
    }
    .tile {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.8em 1em 0.7em;
    }
    .tile.empty .book tbody,
    .tile.empty .footer { opacity: 0.35; }
    .tile .title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--gold);
      font-weight: bold;
      margin-bottom: 0.5em;
      padding-bottom: 0.5em;
      border-bottom: 1px solid var(--border);
    }
    .tile .title .time-stamp {
      color: var(--fg);
      font-weight: normal;
      font-variant-numeric: tabular-nums;
    }
    .tile.empty .title .time-stamp { color: var(--dim); font-style: italic; }
    table.book {
      width: 100%;
      border-collapse: collapse;
      font-variant-numeric: tabular-nums;
    }
    table.book th {
      color: var(--dim);
      font-weight: normal;
      font-size: 0.75em;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 4px 4px;
      text-align: right;
    }
    table.book th.ask-hdr { text-align: left; }
    table.book th.sep { width: 8px; border-left: 1px solid var(--border); padding: 0; }
    table.book td {
      padding: 3px 4px;
      text-align: right;
      transition: background-color 0.35s ease-out;
    }
    table.book td.bid-num, table.book td.bid-price { color: var(--buy); }
    table.book td.ask-num, table.book td.ask-price { color: var(--sell); text-align: left; }
    table.book td.bid-num, table.book td.ask-num { opacity: 0.7; }
    table.book td.sep { border-left: 1px solid var(--border); padding: 0; width: 8px; }
    table.book tr.best td.bid-price,
    table.book tr.best td.ask-price { font-weight: bold; }
    table.book tr.best td.bid-price { background: var(--buy-bg); }
    table.book tr.best td.ask-price { background: var(--sell-bg); }
    table.book td.flash-buy { background: var(--buy); color: var(--bg) !important; }
    table.book td.flash-sell { background: var(--sell); color: var(--bg) !important; }

    .tile .footer {
      margin-top: 0.5em;
      padding-top: 0.5em;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      color: var(--dim);
      font-size: 0.85em;
    }
    .tile .footer .mid { color: var(--gold); }
    .empty-state {
      text-align: center;
      color: var(--dim);
      padding: 4em 1em;
      font-size: 0.95em;
    }
  </style>
</head>
<body>
  <h1>◆ TSETMC Orderbook Replay</h1>

  <div class="controls">
    <div class="field">
      <label>Tickers (comma-separated InsCodes)</label>
      <input type="text" id="tickers" value="35425587644337450,34144395039913458,46700660505281786">
    </div>
    <div class="field"><label>Year (Jalali)</label><input type="number" id="year" value="1402"></div>
    <div class="field"><label>Month</label><input type="number" id="month" value="3" min="1" max="12"></div>
    <div class="field"><label>Day</label><input type="number" id="day" value="1" min="1" max="31"></div>
    <button id="load">Load</button>
    <span class="status" id="status">idle</span>
  </div>

  <div class="slider-row hidden" id="slider-row">
    <button class="play-btn" id="play-btn">▶ Play</button>

    <div class="time-col">
      <span class="time" id="time-display">--:--:--</span>
      <span class="snap-info" id="snap-info">+0s from open</span>
    </div>

    <div class="sliders-col">
      <div class="slider-pair minute">
        <span class="slider-label">HH:MM</span>
        <input type="range" id="minute-slider" min="0" max="405" value="0" step="1">
        <span class="slider-val" id="minute-val">08:45</span>
      </div>
      <div class="slider-pair second">
        <span class="slider-label">SEC</span>
        <input type="range" id="second-slider" min="0" max="59" value="0" step="1">
        <span class="slider-val" id="second-val">:00</span>
      </div>
    </div>
  </div>

  <div class="grid" id="grid">
    <div class="empty-state">Enter ticker IDs and a date, then click Load.</div>
  </div>

<script>
  const API_BASE = window.location.origin;

  // Trading day span covers both equities (08:45→12:30) and ETFs/funds that
  // trade until 15:30. Tickers that close earlier forward-fill their last
  // known state for the remainder of the window.
  const OPEN_SEC  = 8  * 3600 + 45 * 60;    // 31500  (08:45:00)
  const CLOSE_SEC = 15 * 3600 + 30 * 60;    // 55800  (15:30:00)
  const TOTAL_SEC = CLOSE_SEC - OPEN_SEC;   // 24300  (6h45m)
  const TOTAL_MIN = TOTAL_SEC / 60;         // 405

  const state = {
    books: [],          // [{ ticker, date, snapshots, _byOffset: [snap|null × 13501], _startOff }]
    minuteOff: 0,       // 0..225  — minutes past 08:45
    secondOff: 0,       // 0..59
    playing: false,
    playTimer: null,
  };

  // ── helpers ────────────────────────────────────────────────────────────
  function fmtVol(n) {
    if (!n) return '0';
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return n.toString();
  }
  function fmtPrice(p) {
    if (!p) return '—';
    return Math.round(p).toLocaleString('en-US');
  }
  function timeToSec(t) {
    const [h, m, s] = t.split(':').map(Number);
    return h * 3600 + m * 60 + s;
  }
  function secToClock(sec) {
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }
  function setStatus(msg, kind = '') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status ' + kind;
  }
  function currentOffset() {
    // Combined seconds-since-open, clamped to the trading day
    return Math.min(TOTAL_SEC, state.minuteOff * 60 + state.secondOff);
  }

  // ── preprocess: build offset-keyed lookup so any book can be queried
  //    at any wall-clock second in O(1), with forward-fill after its start
  function preprocessBook(book) {
    const arr = new Array(TOTAL_SEC + 1).fill(null);
    const snaps = book.snapshots;
    if (!snaps.length) { book._byOffset = arr; book._startOff = TOTAL_SEC + 1; return; }

    // pre-convert times once
    const secs = snaps.map(s => timeToSec(s.time) - OPEN_SEC);
    book._startOff = secs[0];

    let si = 0;
    let lastSnap = null;
    for (let off = 0; off <= TOTAL_SEC; off++) {
      while (si < snaps.length && secs[si] <= off) {
        lastSnap = snaps[si];
        si++;
      }
      arr[off] = lastSnap;  // null before book's first event
    }
    book._byOffset = arr;
  }

  function getSnapAt(book, offset) {
    return book._byOffset ? book._byOffset[offset] : null;
  }

  // ── fetch ──────────────────────────────────────────────────────────────
  async function fetchBook(ticker, year, month, day) {
    const url = `${API_BASE}/api/orderbook/${encodeURIComponent(ticker)}`
              + `?year=${year}&month=${month}&day=${day}`;
    const res = await fetch(url);
    if (!res.ok) {
      const body = await res.text();
      throw new Error(`${ticker}: HTTP ${res.status} — ${body}`);
    }
    return await res.json();
  }

  async function load() {
    const tickers = document.getElementById('tickers').value
      .split(',').map(s => s.trim()).filter(Boolean);
    const year = +document.getElementById('year').value;
    const month = +document.getElementById('month').value;
    const day = +document.getElementById('day').value;

    if (!tickers.length) { setStatus('provide at least one ticker', 'error'); return; }

    document.getElementById('load').disabled = true;
    stopPlayback();
    setStatus(`fetching ${tickers.length} ticker(s)...`);
    document.getElementById('grid').innerHTML = '';
    document.getElementById('slider-row').classList.add('hidden');
    state.books = [];

    const results = await Promise.all(tickers.map(t =>
      fetchBook(t, year, month, day)
        .then(d => ({ ok: true, data: d }))
        .catch(e => ({ ok: false, ticker: t, err: e.message }))
    ));

    const errors = [];
    for (const r of results) {
      if (!r.ok) { errors.push(r.err); continue; }
      if (!r.data.snapshots.length) { errors.push(`${r.data.ticker}: no data`); continue; }
      preprocessBook(r.data);
      state.books.push(r.data);
    }

    document.getElementById('load').disabled = false;

    if (!state.books.length) {
      setStatus(`no playable books (${errors.join('; ')})`, 'error');
      document.getElementById('grid').innerHTML =
        '<div class="empty-state">No data returned. Check the Jalali date and ticker IDs.</div>';
      return;
    }

    // Start the slider at the earliest moment ANY book has data.
    // Tiles without data yet show a dim "no data yet" state and light up
    // as their first event arrives.
    const firstOff = Math.min(...state.books.map(b => b._startOff));
    state.minuteOff = Math.floor(firstOff / 60);
    state.secondOff = firstOff % 60;
    document.getElementById('minute-slider').value = state.minuteOff;
    document.getElementById('second-slider').value = state.secondOff;
    document.getElementById('slider-row').classList.remove('hidden');

    buildGrid();
    updateAll(null);

    const totalSnaps = state.books.reduce((a, b) => a + b.snapshots.length, 0);
    let msg = `loaded ${state.books.length} book(s) · ${totalSnaps.toLocaleString()} raw snapshots · range ${secToClock(OPEN_SEC + firstOff)} → 12:30:00`;
    if (errors.length) msg += ` · skipped ${errors.length}`;
    setStatus(msg, 'ok');
  }

  // ── render ─────────────────────────────────────────────────────────────
  function buildGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    for (const book of state.books) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.dataset.ticker = book.ticker;
      tile.innerHTML = `
        <div class="title">
          <span>◆ ${book.ticker}</span>
          <span class="time-stamp" data-f="time">--:--:--</span>
        </div>
        <table class="book">
          <thead>
            <tr>
              <th>Cnt</th><th>Vol</th><th>Bid</th>
              <th class="sep"></th>
              <th class="ask-hdr">Ask</th><th class="ask-hdr">Vol</th><th class="ask-hdr">Cnt</th>
            </tr>
          </thead>
          <tbody>
            ${[1,2,3,4,5].map(d => `
              <tr data-depth="${d}">
                <td class="bid-num" data-f="bc"></td>
                <td class="bid-num" data-f="bv"></td>
                <td class="bid-price" data-f="bp"></td>
                <td class="sep"></td>
                <td class="ask-price" data-f="sp"></td>
                <td class="ask-num" data-f="sv"></td>
                <td class="ask-num" data-f="sc"></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        <div class="footer">
          <span class="mid" data-f="mid">mid —</span>
          <span data-f="spread">spread —</span>
        </div>
      `;
      grid.appendChild(tile);
    }
  }

  function clearTile(tile) {
    tile.classList.add('empty');
    tile.querySelector('[data-f="time"]').textContent = '— no data yet —';
    for (let i = 1; i <= 5; i++) {
      const row = tile.querySelector(`tr[data-depth="${i}"]`);
      row.classList.remove('best');
      row.querySelectorAll('td[data-f]').forEach(td => {
        td.textContent = '';
        td.classList.remove('flash-buy', 'flash-sell');
      });
    }
    tile.querySelector('[data-f="mid"]').textContent = 'mid —';
    tile.querySelector('[data-f="spread"]').textContent = 'spread —';
  }

  function updateTile(tile, snap, prevSnap) {
    if (!snap) { clearTile(tile); return; }
    tile.classList.remove('empty');
    tile.querySelector('[data-f="time"]').textContent = snap.time;

    for (let i = 0; i < 5; i++) {
      const d = snap.depths[i];
      const pd = prevSnap ? prevSnap.depths[i] : null;
      const row = tile.querySelector(`tr[data-depth="${d.depth}"]`);
      row.classList.toggle('best', d.depth === 1);

      const bpEl = row.querySelector('[data-f="bp"]');
      const spEl = row.querySelector('[data-f="sp"]');
      row.querySelector('[data-f="bc"]').textContent = d.buy_count || '';
      row.querySelector('[data-f="bv"]').textContent = fmtVol(d.buy_volume);
      bpEl.textContent = fmtPrice(d.buy_price);
      spEl.textContent = fmtPrice(d.sell_price);
      row.querySelector('[data-f="sv"]').textContent = fmtVol(d.sell_volume);
      row.querySelector('[data-f="sc"]').textContent = d.sell_count || '';

      bpEl.classList.remove('flash-buy');
      spEl.classList.remove('flash-sell');
      if (pd && pd.buy_price !== d.buy_price) {
        void bpEl.offsetWidth;
        bpEl.classList.add('flash-buy');
      }
      if (pd && pd.sell_price !== d.sell_price) {
        void spEl.offsetWidth;
        spEl.classList.add('flash-sell');
      }
    }

    const best = snap.depths[0];
    const midEl = tile.querySelector('[data-f="mid"]');
    const spEl = tile.querySelector('[data-f="spread"]');
    if (best.buy_price && best.sell_price) {
      const mid = (best.buy_price + best.sell_price) / 2;
      const spread = best.sell_price - best.buy_price;
      const bps = Math.round(spread / mid * 10000);
      midEl.textContent = `mid ${fmtPrice(mid)}`;
      spEl.textContent = `spread ${fmtPrice(spread)} (${bps} bps)`;
    } else {
      midEl.textContent = 'mid —';
      spEl.textContent = 'spread —';
    }
  }

  function updateAll(prevOff) {
    const off = currentOffset();
    const tiles = document.querySelectorAll('.tile');

    tiles.forEach((tile, i) => {
      const book = state.books[i];
      const snap = getSnapAt(book, off);
      const prevSnap = (prevOff != null && prevOff !== off) ? getSnapAt(book, prevOff) : null;
      updateTile(tile, snap, prevSnap);
    });

    // Top-level time display is derived from the slider itself, NOT from any
    // book — so it always reflects the true wall-clock cursor regardless of
    // whether any particular ticker has data at this instant.
    const wallSec = OPEN_SEC + off;
    document.getElementById('time-display').textContent = secToClock(wallSec);
    document.getElementById('snap-info').textContent = `+${off}s from open · ${state.books.length} books`;

    // Per-slider labels
    const mH = Math.floor((OPEN_SEC + state.minuteOff * 60) / 3600);
    const mM = Math.floor(((OPEN_SEC + state.minuteOff * 60) % 3600) / 60);
    document.getElementById('minute-val').textContent =
      `${String(mH).padStart(2,'0')}:${String(mM).padStart(2,'0')}`;
    document.getElementById('second-val').textContent =
      `:${String(state.secondOff).padStart(2,'0')}`;
  }

  // ── playback ───────────────────────────────────────────────────────────
  function stopPlayback() {
    if (state.playTimer) clearInterval(state.playTimer);
    state.playTimer = null;
    state.playing = false;
    document.getElementById('play-btn').textContent = '▶ Play';
  }
  function startPlayback() {
    state.playing = true;
    document.getElementById('play-btn').textContent = '⏸ Pause';
    state.playTimer = setInterval(() => {
      let off = currentOffset();
      if (off >= TOTAL_SEC) { stopPlayback(); return; }
      const prev = off;
      off += 1;
      state.minuteOff = Math.floor(off / 60);
      state.secondOff = off % 60;
      document.getElementById('minute-slider').value = state.minuteOff;
      document.getElementById('second-slider').value = state.secondOff;
      updateAll(prev);
    }, 100);   // 10 fps; adjust for slower/faster playback
  }
  function togglePlayback() {
    if (state.playing) stopPlayback(); else startPlayback();
  }

  function stepBy(delta) {
    const prev = currentOffset();
    let off = Math.max(0, Math.min(TOTAL_SEC, prev + delta));
    state.minuteOff = Math.floor(off / 60);
    state.secondOff = off % 60;
    document.getElementById('minute-slider').value = state.minuteOff;
    document.getElementById('second-slider').value = state.secondOff;
    updateAll(prev);
  }

  // ── wiring ─────────────────────────────────────────────────────────────
  document.getElementById('load').addEventListener('click', load);

  document.getElementById('minute-slider').addEventListener('input', (e) => {
    const prev = currentOffset();
    state.minuteOff = +e.target.value;
    if (state.playing) stopPlayback();
    updateAll(prev);
  });
  document.getElementById('second-slider').addEventListener('input', (e) => {
    const prev = currentOffset();
    state.secondOff = +e.target.value;
    if (state.playing) stopPlayback();
    updateAll(prev);
  });

  document.getElementById('play-btn').addEventListener('click', togglePlayback);

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === ' ')          { e.preventDefault(); togglePlayback(); }
    else if (e.key === 'ArrowRight') stepBy(1);
    else if (e.key === 'ArrowLeft')  stepBy(-1);
    else if (e.key === 'ArrowUp')    stepBy(60);    // jump 1 min
    else if (e.key === 'ArrowDown')  stepBy(-60);
  });
</script>
</body>
</html>
