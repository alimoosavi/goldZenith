version: '3'

tasks:
  default:
    desc: List tasks
    cmds:
      - task --list

  sync:
    desc: Install / update dependencies
    cmds:
      - uv sync

  serve:
    desc: Run the FastAPI service (prod-ish, no reload)
    cmds:
      - uv run uvicorn api:app --host 0.0.0.0 --port 8000

  dev:
    desc: Run the FastAPI service with auto-reload
    cmds:
      - uv run uvicorn api:app --reload --reload-dir src --reload-dir static --host 127.0.0.1 --port 8000

  dashboard:
    desc: Grid curses dashboard for many tickers at once
    cmds:
      - uv run python scripts/orderbook_dashboard.py {{.CLI_ARGS}}

  mid-csv:
    desc: Export per-second mid-price CSV (to data/) — pass --tickers --year --month --day [--out] via -- CLI_ARGS
    cmds:
      - uv run python scripts/mid_prices.py export {{.CLI_ARGS}}

  mid-plot:
    desc: Plot a mid-price CSV — pass <csv-path> [--mode subplots|overlay|normalized] [--out FILE] via -- CLI_ARGS
    cmds:
      - uv run python scripts/mid_prices.py plot {{.CLI_ARGS}}

  mid-all:
    desc: Export + plot in one go — pass --tickers --year --month --day [--mode ...] via -- CLI_ARGS
    cmds:
      - uv run python scripts/mid_prices.py all {{.CLI_ARGS}}

  stream:
    desc: Run a broker streamer for every ISIN in INSTRUMENTS_FILE — pass --broker [--isin OVERRIDE ... | --mock --date YYYY-MM-DD [--speed N]] via -- CLI_ARGS
    cmds:
      - uv run python scripts/broker_signalr_stream.py {{.CLI_ARGS}}

  feed:
    desc: Subscribe to {broker}:{isin}:orderbook streams — pass --broker [--isins ... | --mock --date YYYY-MM-DD [--speed N]] via -- CLI_ARGS
    cmds:
      - uv run python scripts/run_feed.py {{.CLI_ARGS}}

  persister:
    desc: Persist orderbook updates to JSONL (data/ticks/{isin}/{date}.jsonl) — pass --broker --isin ... [--out --flush-every] via -- CLI_ARGS
    cmds:
      - uv run python scripts/run_persister.py {{.CLI_ARGS}}

  arb-detector:
    desc: Detect arbitrage signals from orderbook streams — pass --broker --isin ... via -- CLI_ARGS
    cmds:
      - uv run python scripts/run_arb_detector.py {{.CLI_ARGS}}

  arb-engine:
    desc: Run the unified arbitrage execution engine (state + evaluate hook) — pass --broker [--isin ...] via -- CLI_ARGS
    cmds:
      - uv run python scripts/run_arb_engine.py {{.CLI_ARGS}}
