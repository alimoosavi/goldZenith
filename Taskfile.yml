version: '3'

tasks:
  default:
    desc: List tasks
    cmds:
      - task --list

  sync:
    desc: Install / update dependencies
    cmds:
      - uv sync

  serve:
    desc: Run the FastAPI orderbook service (prod-ish, no reload)
    cmds:
      - uv run uvicorn tsetmc_orderbook.api:app --host 0.0.0.0 --port 8000

  dev:
    desc: Run the FastAPI service with auto-reload
    cmds:
      - uv run uvicorn tsetmc_orderbook.api:app --reload --reload-dir src --reload-dir static --host 127.0.0.1 --port 8000

  terminal:
    desc: Single-ticker curses replay (pass --ticker / --date / --speed via -- CLI_ARGS)
    cmds:
      - uv run python orderbook_terminal.py {{.CLI_ARGS}}

  multi:
    desc: Switchable multi-ticker curses replay
    cmds:
      - uv run python orderbook_multi.py {{.CLI_ARGS}}

  dashboard:
    desc: Grid curses dashboard for many tickers at once
    cmds:
      - uv run python orderbook_dashboard.py {{.CLI_ARGS}}
